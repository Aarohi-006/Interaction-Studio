<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro-Local Knowledge</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Helvetica, Arial, sans-serif;
  background: #e8e0c8;
}

.app {
  max-width: 420px;
  margin: auto;
  min-height: 100vh;
  background: #f5f0dc;
}

/* HEADER */
.header {
  text-align: center;
  padding: 16px;
  font-weight: bold;
  font-size: 18px;
  color: #333;
  background: #e9d9a8;
  border-radius: 12px;
  margin: 12px;
}

/* MAP */
.map {
  position: relative;
  height: 360px;
  margin: 0 12px;
  border-radius: 12px;
  overflow: hidden;
  background: url('map.png') center/cover no-repeat;
}

/* LABELS */
.label {
  position: absolute;
  z-index: 10;
  padding: 6px 12px;
  border-radius: 14px;
  font-size: 12px;
  cursor: pointer;
  background: rgba(255,255,255,0.95);
  border: 1px solid #ccc;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

.label:active {
  transform: scale(0.95);
}

/* POSITIONS */
.lang { top:40px; left:30px; }
.parsons { top:180px; left:20px; }
.uc { top:150px; left:160px; background:#ff4d4d; color:white; }
.nssr { top:40px; right:20px; }
.copa { bottom:70px; right:20px; }

/* TIPS */
.tip {
  position:absolute;
  z-index: 9;
  background:#ffe08a;
  padding:5px 8px;
  border-radius:10px;
  font-size:11px;
}

/* FILTER */
.filters {
  display:flex;
  gap:8px;
  padding:12px;
  overflow-x:auto;
}

.filter {
  padding:8px 12px;
  border-radius:20px;
  color:white;
  font-size:11px;
  cursor:pointer;
}

.f-all { background:#999; }
.f-lang { background:#6cc4d4; }
.f-parsons { background:#e59b64; }
.f-uc { background:#ff4d4d; }
.f-copa { background:#9b4de3; }
.f-nssr { background:#3fb34f; }

/* BUILDING */
.building {
  display:none;
  padding:20px;
}

/* FEED */
.feed {
  display:none;
  padding:20px;
}

/* MODAL */
.modal {
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  max-width:420px;
  background:white;
  padding:20px;
  border-radius:20px 20px 0 0;
  transition:0.3s;
}
.modal.active { bottom:0; }

input, select {
  width:100%;
  margin:8px 0;
  padding:8px;
}

button {
  padding:10px;
  border:none;
  background:gold;
  width:100%;
  border-radius:10px;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  max-width:420px;
  background:#8cc7c3;
  display:flex;
  justify-content:space-around;
  padding:12px;
}
</style>

</head>

<body>

<div class="app">

<div class="header">THE NEW SCHOOL CAMPUS</div>

<!-- MAP -->

<div class="map" id="map">

  <!-- LABELS -->

  <div class="label lang" onclick="filterTips('lang')">Lang</div>
  <div class="label parsons" onclick="filterTips('parsons')">Parsons</div>
  <div class="label uc" onclick="openBuilding()">UC</div>
  <div class="label nssr" onclick="filterTips('nssr')">NSSR</div>
  <div class="label copa" onclick="filterTips('copa')">CoPA</div>

  <!-- TIPS -->

  <div id="tips-container"></div>

</div>

<!-- FILTER -->

<div class="filters">
  <div class="filter f-all" onclick="filterTips('all')">All</div>
  <div class="filter f-lang" onclick="filterTips('lang')">Lang</div>
  <div class="filter f-parsons" onclick="filterTips('parsons')">Parsons</div>
  <div class="filter f-uc" onclick="filterTips('uc')">UC</div>
  <div class="filter f-copa" onclick="filterTips('copa')">CoPA</div>
  <div class="filter f-nssr" onclick="filterTips('nssr')">NSSR</div>
</div>

<!-- BUILDING -->

<div class="building" id="building">
  <h3>University Center</h3>
  <p>Free pizza – 2nd floor</p>
  <button onclick="closeBuilding()">Back</button>
</div>

<!-- FEED -->

<div class="feed" id="feed">
  <h3>Feed</h3>
  <div id="feed-list"></div>
</div>

<!-- MODAL -->

<div class="modal" id="modal">
  <h3>Add Tip</h3>
  <input id="tipText" placeholder="What's happening?">
  <select id="tipSchool">
    <option value="uc">UC</option>
    <option value="lang">Lang</option>
    <option value="parsons">Parsons</option>
    <option value="copa">CoPA</option>
    <option value="nssr">NSSR</option>
  </select>
  <button onclick="addTip()">Post</button>
</div>

<!-- NAV -->

<div class="nav">
  <div onclick="showMap()">Map</div>
  <div onclick="openModal()">＋</div>
  <div onclick="showFeed()">Feed</div>
</div>

</div>

<script>
let tips = [
  {text:"Free pizza – UC", school:"uc"},
  {text:"Quiet study – Lang", school:"lang"}
];

function renderTips(){
  let container = document.getElementById("tips-container");
  container.innerHTML = "";

  tips.forEach(t=>{
    let div = document.createElement("div");
    div.className = "tip";
    div.innerText = t.text;

    if(t.school==="uc"){ div.style.top="230px"; div.style.left="150px"; }
    if(t.school==="lang"){ div.style.top="100px"; div.style.left="40px"; }
    if(t.school==="parsons"){ div.style.top="220px"; div.style.left="30px"; }

    container.appendChild(div);
  });

  let feed = document.getElementById("feed-list");
  feed.innerHTML = "";
  tips.forEach(t=>{
    let p = document.createElement("p");
    p.innerText = t.text;
    feed.appendChild(p);
  });
}

function addTip(){
  let text = document.getElementById("tipText").value;
  let school = document.getElementById("tipSchool").value;

  if(text){
    tips.push({text, school});
    renderTips();
    closeModal();
  }
}

function filterTips(school){
  document.querySelectorAll(".tip").forEach((tip, index)=>{
    if(school==="all" || tips[index].school===school){
      tip.style.display="block";
    } else {
      tip.style.display="none";
    }
  });
}

function openModal(){
  document.getElementById("modal").classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

function openBuilding(){
  document.getElementById("building").style.display="block";
}

function closeBuilding(){
  document.getElementById("building").style.display="none";
}

function showFeed(){
  document.getElementById("feed").style.display="block";
  document.getElementById("map").style.display="none";
}

function showMap(){
  document.getElementById("feed").style.display="none";
  document.getElementById("map").style.display="block";
}

renderTips();
</script>

</body>
</html>
