<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micro-Local Knowledge</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: #e8e0c8;
    }

    .app {
      max-width: 420px;
      margin: auto;
      min-height: 100vh;
      background: #f5f0dc;
    }

    .header {
      text-align: center;
      padding: 22px 16px;
      font-weight: bold;
      background: #e3d8a8;
      margin: 14px;
      border-radius: 20px;
      color: #111;
      font-size: 18px;
    }

    .map {
      position: relative;
      height: 720px;
      margin: 0 14px;
      border-radius: 22px;
      background: url('map.png') center top / contain no-repeat;
      background-color: #FF0000;
      overflow: hidden;
    }

    .hotspot {
      position: absolute;
      cursor: pointer;
      border-radius: 18px;
      transition: 0.2s ease;
      z-index: 2;
    }

    .hotspot:hover {
      background: rgba(255,255,255,0.08);
    }

    /* Building hotspots */
    .copa-zone { top: 0; left: 0; width: 190px; height: 180px; }
    .lang-zone { top: 0; right: 0; width: 170px; height: 180px; }
    .uc-zone { top: 180px; left: 105px; width: 210px; height: 250px; }
    .nssr-zone { bottom: 0; left: 0; width: 190px; height: 210px; }
    .parsons-zone { bottom: 0; right: 0; width: 200px; height: 210px; }

    .tip {
      position: absolute;
      background: #f6d97b;
      padding: 8px 12px;
      border-radius: 18px;
      font-size: 11px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      max-width: 130px;
      line-height: 1.3;
      z-index: 3;
    }

    /* filter chips directly under map */
    .school-hotspots {
      display: flex;
      gap: 10px;
      padding: 14px;
      overflow-x: auto;
    }

    .school-chip {
      padding: 10px 14px;
      border-radius: 24px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      font-weight: bold;
      border: none;
    }

    .all { background:#999; }
    .lang { background:#6cc4d4; }
    .parsons { background:#e59b64; }
    .uc { background:red; }
    .copa { background:#9b4de3; }
    .nssr { background:#3fb34f; }

    .feed {
      display: none;
      padding: 20px;
      padding-bottom: 90px;
    }

    .feed p {
      background: white;
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .modal {
      position: fixed;
      bottom: -100%;
      left: 0;
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 20px;
      transition: 0.3s;
      border-radius: 16px 16px 0 0;
      z-index: 99;
    }

    .modal.active { bottom: 0; }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      border: none;
      background: #e9d9a8;
      cursor: pointer;
      font-weight: bold;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 420px;
      background: #8cc7c3;
      display: flex;
      justify-content: space-around;
      padding: 14px;
      font-weight: bold;
    }
  </style>

</head>

<body>
<div class="app">

  <div class="header">THE NEW SCHOOL CAMPUS</div>

  <div class="map" id="map">
    <div class="hotspot copa-zone" onclick="filterTips('copa')"></div>
    <div class="hotspot lang-zone" onclick="filterTips('lang')"></div>
    <div class="hotspot uc-zone" onclick="filterTips('uc')"></div>
    <div class="hotspot nssr-zone" onclick="filterTips('nssr')"></div>
    <div class="hotspot parsons-zone" onclick="filterTips('parsons')"></div>

    
<div id="tips-container"></div>


  </div>

  <div class="school-hotspots">
    <button class="school-chip all" onclick="filterTips('all')">All</button>
    <button class="school-chip copa" onclick="filterTips('copa')">CoPA</button>
    <button class="school-chip lang" onclick="filterTips('lang')">Lang</button>
    <button class="school-chip uc" onclick="filterTips('uc')">UC</button>
    <button class="school-chip nssr" onclick="filterTips('nssr')">NSSR</button>
    <button class="school-chip parsons" onclick="filterTips('parsons')">Parsons</button>
  </div>

  <div class="feed" id="feed">
    <h3>Feed</h3>
    <div id="feed-list"></div>
    <h4>References</h4>
    <div id="arena-list"></div>
  </div>

  <div class="modal" id="modal">
    <h3>Add Tip</h3>
    <input id="tipText" placeholder="What's happening?">
    <select id="tipSchool">
      <option value="uc">UC</option>
      <option value="lang">Lang</option>
      <option value="parsons">Parsons</option>
      <option value="copa">CoPA</option>
      <option value="nssr">NSSR</option>
    </select>
    <button onclick="addTip()">Post</button>
  </div>

  <div class="nav">
    <div onclick="showMap()">Map</div>
    <div onclick="openModal()">＋</div>
    <div onclick="showFeed()">Feed</div>
  </div>
</div>

<script>
const SHEET_API = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";
const ARENA_CHANNEL = "design";

let tips = [];
let currentFilter = "all";

function getPosition(school){
  const positions = {
    copa: {top:120, left:45},
    lang: {top:120, left:270},
    uc: {top:360, left:165},
    nssr: {top:585, left:45},
    parsons: {top:585, left:255}
  };
  return positions[school];
}

async function loadTips(){
  try {
    const res = await fetch(SHEET_API);
    tips = await res.json();
  } catch {
    tips = [
      { tip:"Quiet study – Lang", school:"lang", time:"2:10 PM" },
      { tip:"Free pizza – UC", school:"uc", time:"3:15 PM" }
    ];
  }
  renderTips();
}

function renderTips(){
  const container = document.getElementById("tips-container");
  const feed = document.getElementById("feed-list");

  container.innerHTML = "";
  feed.innerHTML = "";

  tips.forEach(t => {
    const school = (t.school || "").toLowerCase().trim();
    const text = t.tip || t.text;

    if(currentFilter !== "all" && school !== currentFilter) return;

    const pos = getPosition(school);
    if(pos){
      let div = document.createElement("div");
      div.className = "tip";
      div.innerText = text;
      div.style.top = pos.top + "px";
      div.style.left = pos.left + "px";
      container.appendChild(div);
    }

    let p = document.createElement("p");
    p.innerText = text + (t.time ? ` (${t.time})` : "");
    feed.appendChild(p);
  });
}

async function addTip(){
  const text = document.getElementById("tipText").value.trim();
  const school = document.getElementById("tipSchool").value;

  if(!text) return;

  const payload = {
    tip: text,
    school: school.toLowerCase(),
    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
  };

  try {
    await fetch(SHEET_API, {
      method: "POST",
      body: JSON.stringify(payload)
    });
    await loadTips();
  } catch {
    tips.push(payload);
    renderTips();
  }

  document.getElementById("tipText").value = "";
  closeModal();
}

function filterTips(school){
  currentFilter = school.toLowerCase();
  renderTips();
}

function openModal(){ document.getElementById("modal").classList.add("active"); }
function closeModal(){ document.getElementById("modal").classList.remove("active"); }

function showFeed(){
  document.getElementById("feed").style.display = "block";
  document.querySelector(".map").style.display = "none";
  document.querySelector(".school-hotspots").style.display = "none";
}

function showMap(){
  document.getElementById("feed").style.display = "none";
  document.querySelector(".map").style.display = "block";
  document.querySelector(".school-hotspots").style.display = "flex";
}

loadTips();
</script>

</body>
</html>
