<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro-Local Knowledge</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Helvetica, Arial, sans-serif;
  background: #efe8d0;
}

.app {
  max-width: 420px;
  margin: 0 auto;
  background: #fff;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

/* HEADER */
.header {
  height: 50px;
  background: #ddd;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  font-size: 14px;
}

/* SCREENS WRAPPER */
.screens {
  position: relative;
  width: 300%;
  display: flex;
  transition: transform 0.4s ease;
}

/* EACH SCREEN */
.screen {
  width: 100%;
  height: calc(100vh - 110px);
  position: relative;
}

/* MAP */
.map {
  background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Union_Square_Map.png/640px-Union_Square_Map.png') center/cover;
}

/* TIP */
.tip {
  position: absolute;
  background: #ffe08a;
  padding: 6px 10px;
  border-radius: 12px;
  font-size: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

/* UC marker */
.uc {
  position: absolute;
  top: 120px;
  left: 140px;
  width: 44px;
  height: 44px;
  background: red;
  border-radius: 50%;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.4s ease;
}

/* BUILDING OVERLAY */
.building {
  position: absolute;
  inset: 0;
  background: #f4f4f4;
  display: none;
  z-index: 5;
}

.floor-tip {
  position: absolute;
  background: #aee1f9;
  padding: 5px 8px;
  border-radius: 8px;
  font-size: 11px;
}

/* FEED + PROFILE */
.feed, .profile {
  padding: 20px;
}

/* MODAL (BOTTOM SHEET) */
.modal {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  max-width: 420px;
  background: #fff;
  border-radius: 20px 20px 0 0;
  padding: 15px;
  transition: bottom 0.3s ease;
  box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
}

.modal.active {
  bottom: 0;
}

.modal input, .modal select {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
}

.modal button {
  width: 100%;
  padding: 10px;
  border: none;
  background: gold;
  border-radius: 10px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 420px;
  background: #8cc7c3;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.nav button {
  background: none;
  border: none;
  font-size: 16px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="app">

  <div class="header">
    <span>Search</span>
    <span>Filter</span>
  </div>

  <!-- SCREENS -->

  <div class="screens" id="screens">

```
<!-- MAP -->
<div class="screen map">

  <div class="tip" style="top:50px; left:40px;">
    Free pizza 🍕 (10m)
  </div>

  <div class="tip" style="top:200px; left:60px;">
    Quiet study (Lang)
  </div>

  <div class="uc" onclick="zoomToBuilding()">UC</div>

  <!-- BUILDING OVERLAY -->
  <div class="building" id="building">
    <button onclick="closeBuilding()">← Back</button>

    <div class="floor-tip" style="top:80px; left:120px;">
      Pizza – 2nd floor
    </div>

    <div class="floor-tip" style="top:180px; left:140px;">
      Elevator broken
    </div>
  </div>

</div>

<!-- FEED -->
<div class="screen feed">
  <h3>Feed</h3>
  <p>Free pizza – 2 min left</p>

</div>

<!-- PROFILE -->
<div class="screen profile">
  <h3>Profile</h3>
  <p>Your posts</p>
</div>
```

  <!-- MODAL -->

  <div class="modal" id="modal">
    <h4>Add Tip</h4>

```

  <option>Parsons</option>

```

  </div>

  <!-- NAV -->

  <div class="nav">
    <button onclick="goTo(0)">Map</button>
    <button onclick="openModal()">＋</button>
    <button onclick="goTo(1)">Feed</button>
    <button onclick="goTo(2)">Profile</button>
  </div>

</div>

<script>
let index = 0;
const screens = document.getElementById("screens");

/* NAVIGATION */
function goTo(i) {
  index = i;
  screens.style.transform = `translateX(-${i * 100}%)`;
}

/* SWIPE */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) goTo(Math.min(index + 1, 2));
  if (endX - startX > 50) goTo(Math.max(index - 1, 0));
});

/* BUILDING ZOOM */
function zoomToBuilding() {
  document.querySelector(".uc").style.transform = "scale(4)";
  setTimeout(() => {
    document.getElementById("building").style.display = "block";
  }, 300);
}

function closeBuilding() {
  document.querySelector(".uc").style.transform = "scale(1)";
  document.getElementById("building").style.display = "none";
}

/* MODAL */
function openModal() {
  document.getElementById("modal").classList.add("active");
}

function closeModal() {
  document.getElementById("modal").classList.remove("active");
}
</script>

</body>
</html>
