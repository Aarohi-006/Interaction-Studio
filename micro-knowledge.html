<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro-Local Knowledge</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Helvetica, Arial, sans-serif;
  background: #e8e0c8;
}

.app {
  max-width: 420px;
  margin: auto;
  min-height: 100vh;
  background: #f5f0dc;
}

/* HEADER */
.header {
  text-align: center;
  padding: 16px;
  font-weight: bold;
  background: #e9d9a8;
  margin: 12px;
  border-radius: 10px;
}

/* MAP */
.map {
  position: relative;
  height: 360px;
  margin: 0 12px;
  border-radius: 10px;
  background: url('map.png') center/cover no-repeat;
}

/* LABELS */
.label {
  position: absolute;
  padding: 6px 12px;
  border-radius: 12px;
  font-size: 12px;
  background: white;
  cursor: pointer;
}

.lang { top:40px; left:30px; }
.parsons { top:180px; left:20px; }
.uc { top:150px; left:160px; background:red; color:white; }
.nssr { top:40px; right:20px; }
.copa { bottom:70px; right:20px; }

/* TIPS */
.tip {
  position:absolute;
  background:#ffe08a;
  padding:5px 8px;
  border-radius:10px;
  font-size:11px;
}

/* FILTER */
.filters {
  display:flex;
  gap:8px;
  padding:12px;
}

.filter {
  padding:6px 10px;
  border-radius:20px;
  color:white;
  font-size:11px;
  cursor:pointer;
}

.f-all { background:#999; }
.f-lang { background:#6cc4d4; }
.f-parsons { background:#e59b64; }
.f-uc { background:red; }
.f-copa { background:#9b4de3; }
.f-nssr { background:#3fb34f; }

/* FEED */
.feed {
  display:none;
  padding:20px;
}

/* MODAL */
.modal {
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  max-width:420px;
  background:white;
  padding:20px;
  transition:0.3s;
}
.modal.active { bottom:0; }

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  max-width:420px;
  background:#8cc7c3;
  display:flex;
  justify-content:space-around;
  padding:12px;
}
</style>

</head>

<body>

<div class="app">

<div class="header">THE NEW SCHOOL CAMPUS</div>

<div class="map" id="map">
  <div class="label lang" onclick="filterTips('lang')">Lang</div>
  <div class="label parsons" onclick="filterTips('parsons')">Parsons</div>
  <div class="label uc" onclick="filterTips('uc')">UC</div>
  <div class="label nssr" onclick="filterTips('nssr')">NSSR</div>
  <div class="label copa" onclick="filterTips('copa')">CoPA</div>

  <div id="tips-container"></div>
</div>

<div class="filters">
  <div class="filter f-all" onclick="filterTips('all')">All</div>
  <div class="filter f-lang" onclick="filterTips('lang')">Lang</div>
  <div class="filter f-parsons" onclick="filterTips('parsons')">Parsons</div>
  <div class="filter f-uc" onclick="filterTips('uc')">UC</div>
  <div class="filter f-copa" onclick="filterTips('copa')">CoPA</div>
  <div class="filter f-nssr" onclick="filterTips('nssr')">NSSR</div>
</div>

<div class="feed" id="feed">
  <h3>Feed</h3>
  <div id="feed-list"></div>
</div>

<div class="modal" id="modal">
  <h3>Add Tip</h3>
  <input id="tipText" placeholder="What's happening?">
  <select id="tipSchool">
    <option value="uc">UC</option>
    <option value="lang">Lang</option>
    <option value="parsons">Parsons</option>
    <option value="copa">CoPA</option>
    <option value="nssr">NSSR</option>
  </select>
  <button onclick="addTip()">Post</button>
</div>

<div class="nav">
  <div onclick="showMap()">Map</div>
  <div onclick="openModal()">＋</div>
  <div onclick="showFeed()">Feed</div>
</div>

</div>

<script>
let tips = [
  {text:"Free pizza – UC", school:"uc"},
  {text:"Quiet study – Lang", school:"lang"}
];

function renderTips(){
  let container = document.getElementById("tips-container");
  container.innerHTML = "";

  tips.forEach((t, i)=>{
    let div = document.createElement("div");
    div.className = "tip";
    div.innerText = t.text;

    if(t.school==="uc"){ div.style.top="230px"; div.style.left="150px"; }
    if(t.school==="lang"){ div.style.top="100px"; div.style.left="40px"; }

    container.appendChild(div);
  });

  let feed = document.getElementById("feed-list");
  feed.innerHTML = "";
  tips.forEach(t=>{
    let p = document.createElement("p");
    p.innerText = t.text;
    feed.appendChild(p);
  });
}

function addTip(){
  let text = document.getElementById("tipText").value;
  let school = document.getElementById("tipSchool").value;

  if(text){
    tips.push({text, school});
    renderTips();
    closeModal();
  }
}

function filterTips(school){
  document.querySelectorAll(".tip").forEach((tip, index)=>{
    if(school==="all" || tips[index].school===school){
      tip.style.display="block";
    } else {
      tip.style.display="none";
    }
  });
}

function openModal(){
  document.getElementById("modal").classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

function showFeed(){
  document.getElementById("feed").style.display="block";
  document.getElementById("map").style.display="none";
}

function showMap(){
  document.getElementById("feed").style.display="none";
  document.getElementById("map").style.display="block";
}

renderTips();
</script>

</body>
</html>
