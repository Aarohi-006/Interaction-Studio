<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micro-Local Knowledge</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: #e8e0c8;
    }

    .app {
      max-width: 420px;
      margin: auto;
      min-height: 100vh;
      background: #f5f0dc;
      padding-bottom: 90px;
    }

    .header {
      text-align: center;
      padding: 22px 16px;
      font-weight: bold;
      background: #e3d8a8;
      margin: 14px;
      border-radius: 20px;
      color: #111;
      font-size: 18px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .map {
      position: relative;
      height: 720px;
      margin: 0 14px;
      border-radius: 22px;
      background: url('map.png') center top / contain no-repeat;
      background-color: #efefef;
      overflow: hidden;
    }

    .hotspot {
      position: absolute;
      cursor: pointer;
      border-radius: 18px;
      z-index: 2;
    }

    .copa-zone { top: 0; left: 0; width: 190px; height: 180px; }
    .lang-zone { top: 0; right: 0; width: 170px; height: 180px; }
    .uc-zone { top: 180px; left: 105px; width: 210px; height: 250px; }
    .nssr-zone { bottom: 0; left: 0; width: 190px; height: 210px; }
    .parsons-zone { bottom: 0; right: 0; width: 200px; height: 210px; }

    .tip {
      position: absolute;
      background: #f6d97b;
      padding: 8px 12px;
      border-radius: 18px;
      font-size: 11px;
      max-width: 130px;
      z-index: 3;
    }

    .filters {
      display: flex;
      gap: 10px;
      padding: 14px;
      overflow-x: auto;
    }

    .filter {
      padding: 10px 14px;
      border-radius: 24px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      font-weight: bold;
      border: none;
    }

    .f-all { background:#999; }
    .f-lang { background:#6cc4d4; }
    .f-parsons { background:#e59b64; }
    .f-uc { background:red; }
    .f-copa { background:#9b4de3; }
    .f-nssr { background:#3fb34f; }

    .feed, .building {
      padding: 20px;
    }

    .feed p, .arena-card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .floor {
      background: white;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .modal {
      position: fixed;
      bottom: -100%;
      left: 0;
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 20px;
      transition: 0.3s;
      border-radius: 16px 16px 0 0;
      z-index: 99;
    }

    .modal.active { bottom: 0; }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      border: none;
      background: #e9d9a8;
      cursor: pointer;
      font-weight: bold;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 420px;
      background: #8cc7c3;
      display: flex;
      justify-content: space-around;
      padding: 14px;
      font-weight: bold;
      z-index: 100;
    }
  </style>
</head>

<body>
<div class="app">

  <div class="header">THE NEW SCHOOL CAMPUS</div>

  <!-- HOME -->
  <div class="screen active" id="homeScreen">
    <div class="map">
      <div class="hotspot copa-zone" onclick="openBuilding('copa')"></div>
      <div class="hotspot lang-zone" onclick="openBuilding('lang')"></div>
      <div class="hotspot uc-zone" onclick="openBuilding('uc')"></div>
      <div class="hotspot nssr-zone" onclick="openBuilding('nssr')"></div>
      <div class="hotspot parsons-zone" onclick="openBuilding('parsons')"></div>
      <div id="tips-container"></div>
    </div>

    <div class="filters">
      <button class="filter f-all" onclick="filterTips('all')">All</button>
      <button class="filter f-lang" onclick="filterTips('lang')">Lang</button>
      <button class="filter f-parsons" onclick="filterTips('parsons')">Parsons</button>
      <button class="filter f-uc" onclick="filterTips('uc')">UC</button>
      <button class="filter f-copa" onclick="filterTips('copa')">CoPA</button>
      <button class="filter f-nssr" onclick="filterTips('nssr')">NSSR</button>
    </div>
  </div>

  <!-- BUILDING -->
  <div class="screen building" id="buildingScreen">
    <button onclick="showHome()">← Back</button>
    <h2 id="buildingTitle"></h2>
    <div id="floorList"></div>
    <h3>References</h3>
    <div id="arena-content"></div>
  </div>

  <!-- FEED -->
  <div class="screen feed" id="feedScreen">
    <div id="feed-list"></div>
  </div>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <h3>Add Tip</h3>
    <input id="tipText" placeholder="What's happening?" />
    <select id="tipSchool">
      <option value="uc">UC</option>
      <option value="lang">Lang</option>
      <option value="parsons">Parsons</option>
      <option value="copa">CoPA</option>
      <option value="nssr">NSSR</option>
    </select>
    <button onclick="addTip()">Post</button>
  </div>

  <div class="nav">
    <div onclick="showHome()">Map</div>
    <div onclick="openModal()">＋</div>
    <div onclick="showFeed()">Feed</div>
  </div>
</div>

<script>
let tips = [
  { tip:"Quiet study – Lang", school:"lang", time:"2:10 PM" },
  { tip:"Free pizza – UC", school:"uc", time:"3:15 PM" }
];

let currentFilter = "all";

const arenaChannels = {
  uc: "https://api.are.na/v3/channels/uc-npghtqxz8wi/contents",
  parsons: "https://api.are.na/v3/channels/parsons-vs1m3z46yw8/contents",
  lang: "https://api.are.na/v3/channels/lang-eps6ergks48/contents",
  nssr: "https://api.are.na/v3/channels/nssr-uvl_ripsnjg/contents",
  copa: "https://api.are.na/v3/channels/copa-1_xx1whfvcc/contents"
};

const floors = {
  uc: ["6 Quiet Study", "5 Study", "4 Classrooms", "3 Lounge", "2 Free Pizza", "1 Lobby"],
  parsons: ["12 Studios", "10 Crit", "8 Labs", "6 Open Studio", "B Printshop"],
  lang: ["7 Quiet Study", "5 Classrooms", "4 Group Study", "3 Lounge", "1 Entry"],
  nssr: ["11 Research", "8 Graduate Study", "6 Lecture", "3 Reading Room", "1 Lobby"],
  copa: ["151 Bank Black Box", "55 W 13 Drama", "Mannes", "Jazz", "Drama"]
};

function getPosition(school){
  const positions = {
    copa: {top:120, left:45},
    lang: {top:120, left:270},
    uc: {top:360, left:165},
    nssr: {top:585, left:45},
    parsons: {top:585, left:255}
  };
  return positions[school];
}

function renderTips(){
  const container = document.getElementById("tips-container");
  const feed = document.getElementById("feed-list");
  container.innerHTML = "";
  feed.innerHTML = "";

  tips.forEach(t => {
    if(currentFilter !== "all" && t.school !== currentFilter) return;

    const pos = getPosition(t.school);

    if(pos){
      const div = document.createElement("div");
      div.className = "tip";
      div.innerText = t.tip;
      div.style.top = pos.top + "px";
      div.style.left = pos.left + "px";
      container.appendChild(div);
    }

    const p = document.createElement("p");
    p.innerText = `${t.tip} (${t.time})`;
    feed.appendChild(p);
  });
}

function filterTips(school){
  currentFilter = school;
  renderTips();
}

function openBuilding(building){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("buildingScreen").classList.add("active");

  document.getElementById("buildingTitle").innerText = building.toUpperCase();
  const floorList = document.getElementById("floorList");
  floorList.innerHTML = "";

  floors[building].forEach(f => {
    const div = document.createElement("div");
    div.className = "floor";
    div.innerText = f;
    floorList.appendChild(div);
  });

  loadArena(building);
}

async function loadArena(building){
  const container = document.getElementById("arena-content");
  container.innerHTML = "Loading references...";

  try {
    const res = await fetch(arenaChannels[building]);
    const data = await res.json();

    container.innerHTML = "";
    data.contents.slice(0,3).forEach(item => {
      const div = document.createElement("div");
      div.className = "arena-card";
      div.innerText = item.title || item.generated_title || "Untitled";
      container.appendChild(div);
    });
  } catch {
    container.innerHTML = "<div class='arena-card'>No references available.</div>";
  }
}

function showHome(){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("homeScreen").classList.add("active");
}

function showFeed(){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("feedScreen").classList.add("active");
  renderTips();
}

function openModal(){ document.getElementById("modal").classList.add("active"); }
function closeModal(){ document.getElementById("modal").classList.remove("active"); }

function addTip(){
  const text = document.getElementById("tipText").value.trim();
  const school = document.getElementById("tipSchool").value;
  if(!text) return;

  tips.push({
    tip: text,
    school: school,
    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
  });

  document.getElementById("tipText").value = "";
  closeModal();
  renderTips();
}

renderTips();
</script>
</body>
</html>
