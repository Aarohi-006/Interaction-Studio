<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micro-Local Knowledge</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: #e8e0c8;
    }

    .app {
      max-width: 420px;
      margin: auto;
      min-height: 100vh;
      background: #f5f0dc;
    }

    .header {
      text-align: center;
      padding: 22px 16px;
      font-weight: bold;
      background: #e3d8a8;
      margin: 14px;
      border-radius: 20px;
      color: #111;
      font-size: 18px;
    }

    .map {
      position: relative;
      height: 720px;
      margin: 0 14px;
      border-radius: 22px;
      background: url('map.png') center top / contain no-repeat;
      background-color: #efefef;
      overflow: hidden;
    }

    /* Invisible building hotspots */
    .hotspot {
      position: absolute;
      cursor: pointer;
      border-radius: 18px;
      transition: 0.2s ease;
    }

    .hotspot:hover {
      background: rgba(255,255,255,0.08);
    }

    /* adjusted to match full building collage */
    .lang-zone {
      top: 0px;
      left: 0px;
      width: 180px;
      height: 180px;
    }

    .nssr-zone {
      top: 0px;
      right: 0px;
      width: 170px;
      height: 200px;
    }

    .uc-zone {
      top: 190px;
      left: 110px;
      width: 210px;
      height: 260px;
    }

    .parsons-zone {
      bottom: 0px;
      left: 0px;
      width: 200px;
      height: 210px;
    }

    .copa-zone {
      bottom: 0px;
      right: 0px;
      width: 210px;
      height: 210px;
    }

    .tip {
      position: absolute;
      background: #f6d97b;
      padding: 8px 12px;
      border-radius: 18px;
      font-size: 11px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      max-width: 130px;
      line-height: 1.3;
    }

    .filters {
      display: flex;
      gap: 10px;
      padding: 14px;
      overflow-x: auto;
    }

    .filter {
      padding: 10px 14px;
      border-radius: 24px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      font-weight: bold;
    }

    .f-all { background:#999; }
    .f-lang { background:#6cc4d4; }
    .f-parsons { background:#e59b64; }
    .f-uc { background:red; }
    .f-copa { background:#9b4de3; }
    .f-nssr { background:#3fb34f; }

    .feed {
      display: none;
      padding: 20px;
      padding-bottom: 90px;
    }

    .feed h3, .feed h4 {
      margin-top: 0;
      color: #111;
    }

    .feed p {
      background: white;
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .modal {
      position: fixed;
      bottom: -100%;
      left: 0;
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 20px;
      transition: 0.3s;
      border-radius: 16px 16px 0 0;
      z-index: 99;
    }

    .modal.active { bottom: 0; }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      border: none;
      background: #e9d9a8;
      cursor: pointer;
      font-weight: bold;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 420px;
      background: #8cc7c3;
      display: flex;
      justify-content: space-around;
      padding: 14px;
      font-weight: bold;
    }
  </style>

</head>

<body>

<div class="app">

  <div class="header">THE NEW SCHOOL CAMPUS</div>

  <div class="map" id="map">
    <div class="hotspot lang-zone" onclick="filterTips('lang')"></div>
    <div class="hotspot nssr-zone" onclick="filterTips('nssr')"></div>
    <div class="hotspot uc-zone" onclick="filterTips('uc')"></div>
    <div class="hotspot parsons-zone" onclick="filterTips('parsons')"></div>
    <div class="hotspot copa-zone" onclick="filterTips('copa')"></div>

```
<div id="tips-container"></div>
```

  </div>

  <div class="filters">
    <div class="filter f-all" onclick="filterTips('all')">All</div>
    <div class="filter f-lang" onclick="filterTips('lang')">Lang</div>
    <div class="filter f-parsons" onclick="filterTips('parsons')">Parsons</div>
    <div class="filter f-uc" onclick="filterTips('uc')">UC</div>
    <div class="filter f-copa" onclick="filterTips('copa')">CoPA</div>
    <div class="filter f-nssr" onclick="filterTips('nssr')">NSSR</div>
  </div>

  <div class="feed" id="feed">
    <h3>Feed</h3>
    <div id="feed-list"></div>

```
<h4>References</h4>
<div id="arena-list"></div>
```

  </div>

  <div class="modal" id="modal">
    <h3>Add Tip</h3>
    <input id="tipText" placeholder="What's happening?">
    <select id="tipSchool">
      <option value="uc">UC</option>
      <option value="lang">Lang</option>
      <option value="parsons">Parsons</option>
      <option value="copa">CoPA</option>
      <option value="nssr">NSSR</option>
    </select>
    <button onclick="addTip()">Post</button>
  </div>

  <div class="nav">
    <div onclick="showMap()">Map</div>
    <div onclick="openModal()">＋</div>
    <div onclick="showFeed()">Feed</div>
  </div>

</div>

<script>
const SHEET_API = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";
const ARENA_CHANNEL = "design";

let tips = [];
let currentFilter = "all";

function getPosition(school){
  const positions = {
    lang: {top:180, left:80},
    nssr: {top:180, left:285},
    uc: {top:360, left:170},
    parsons: {top:540, left:70},
    copa: {top:560, left:285}
  };
  return positions[school];
}

async function loadTips(){
  try {
    const res = await fetch(SHEET_API);
    tips = await res.json();
    renderTips();
  } catch {
    tips = [
      { tip:"Quiet study – Lang", school:"lang", time:"2:10 PM" },
      { tip:"Free pizza – UC", school:"uc", time:"3:15 PM" }
    ];
    renderTips();
  }
}

async function loadArena(){
  try {
    const res = await fetch(`https://api.are.na/v2/channels/${ARENA_CHANNEL}`);
    const data = await res.json();

    const arena = document.getElementById("arena-list");
    arena.innerHTML = "";

    data.contents.slice(0,3).forEach(item => {
      const p = document.createElement("p");
      p.innerText = item.title || "Untitled";
      arena.appendChild(p);
    });
  } catch {
    document.getElementById("arena-list").innerHTML = "<p>No references loaded.</p>";
  }
}

function renderTips(){
  const container = document.getElementById("tips-container");
  container.innerHTML = "";

  tips.forEach(t => {
    if(currentFilter !== "all" && t.school !== currentFilter) return;

    let div = document.createElement("div");
    div.className = "tip";
    div.innerText = t.tip || t.text;

    let pos = getPosition(t.school);
    if (!pos) return;

    div.style.top = pos.top + "px";
    div.style.left = pos.left + "px";

    container.appendChild(div);
  });

  const feed = document.getElementById("feed-list");
  feed.innerHTML = "";

  tips.forEach(t => {
    if(currentFilter !== "all" && t.school !== currentFilter) return;

    let p = document.createElement("p");
    p.innerText = (t.tip || t.text) + (t.time ? ` (${t.time})` : "");
    feed.appendChild(p);
  });
}

async function addTip(){
  const text = document.getElementById("tipText").value.trim();
  const school = document.getElementById("tipSchool").value;

  if(text === "") return;

  const payload = {
    tip: text,
    school: school,
    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
  };

  try {
    await fetch(SHEET_API, {
      method: "POST",
      body: JSON.stringify(payload)
    });
    loadTips();
  } catch {
    tips.push(payload);
    renderTips();
  }

  document.getElementById("tipText").value = "";
  closeModal();
}

function filterTips(school){
  currentFilter = school;
  renderTips();
}

function openModal(){
  document.getElementById("modal").classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

function showFeed(){
  document.getElementById("feed").style.display = "block";
  document.getElementById("map").style.display = "none";
}

function showMap(){
  document.getElementById("feed").style.display = "none";
  document.getElementById("map").style.display = "block";
}

loadTips();
loadArena();
</script>

</body>
</html>
