<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micro-Local Knowledge</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: #FF0000;
    }

    .app {
      max-width: 420px;
      margin: auto;
      min-height: 100vh;
      background: #f5f0dc;
      padding-bottom: 90px;
    }

    .header {
      text-align: center;
      padding: 22px 16px;
      font-weight: bold;
      background: #e3d8a8;
      margin: 14px;
      border-radius: 20px;
      color: #111;
      font-size: 18px;
    }

    .map {
      position: relative;
      height: 720px;
      margin: 0 14px;
      border-radius: 22px;
      background: url('map.png') center top / contain no-repeat;
      background-color: #efefef;
      overflow: hidden;
    }

    .hotspot {
      position: absolute;
      cursor: pointer;
      border-radius: 18px;
      z-index: 2;
    }

    .copa-zone { top: 0; left: 0; width: 190px; height: 180px; }
    .lang-zone { top: 0; right: 0; width: 170px; height: 180px; }
    .uc-zone { top: 180px; left: 105px; width: 210px; height: 250px; }
    .nssr-zone { bottom: 0; left: 0; width: 190px; height: 210px; }
    .parsons-zone { bottom: 0; right: 0; width: 200px; height: 210px; }

    .tip {
      position: absolute;
      background: #f6d97b;
      padding: 8px 12px;
      border-radius: 18px;
      font-size: 11px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      max-width: 130px;
      line-height: 1.3;
      z-index: 3;
    }

    /* previous filter style */
    .filters {
      display: flex;
      gap: 10px;
      padding: 14px;
      overflow-x: auto;
    }

    .filter {
      padding: 10px 14px;
      border-radius: 24px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      font-weight: bold;
      border: none;
    }

    .f-all { background:#999; }
    .f-lang { background:#6cc4d4; }
    .f-parsons { background:#e59b64; }
    .f-uc { background:red; }
    .f-copa { background:#9b4de3; }
    .f-nssr { background:#3fb34f; }

    .feed {
      display: none;
      padding: 20px;
    }

    .feed p {
      background: white;
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .modal {
      position: fixed;
      bottom: -100%;
      left: 0;
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 20px;
      transition: 0.3s;
      border-radius: 16px 16px 0 0;
      z-index: 99;
    }

    .modal.active { bottom: 0; }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      border: none;
      background: #e9d9a8;
      cursor: pointer;
      font-weight: bold;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 420px;
      background: #8cc7c3;
      display: flex;
      justify-content: space-around;
      padding: 14px;
      font-weight: bold;
      z-index: 100;
    }
  </style>
</head>

<body>
<div class="app">

  <div class="header">THE NEW SCHOOL CAMPUS</div>

  <div class="map" id="map">
    <div class="hotspot copa-zone" onclick="filterTips('copa')"></div>
    <div class="hotspot lang-zone" onclick="filterTips('lang')"></div>
    <div class="hotspot uc-zone" onclick="filterTips('uc')"></div>
    <div class="hotspot nssr-zone" onclick="filterTips('nssr')"></div>
    <div class="hotspot parsons-zone" onclick="filterTips('parsons')"></div>
    <div id="tips-container"></div>
  </div>

  <div class="filters" id="filters">
    <button class="filter f-all" onclick="filterTips('all')">All</button>
    <button class="filter f-lang" onclick="filterTips('lang')">Lang</button>
    <button class="filter f-parsons" onclick="filterTips('parsons')">Parsons</button>
    <button class="filter f-uc" onclick="filterTips('uc')">UC</button>
    <button class="filter f-copa" onclick="filterTips('copa')">CoPA</button>
    <button class="filter f-nssr" onclick="filterTips('nssr')">NSSR</button>
  </div>

  <div class="feed" id="feed">
    <div id="feed-list"></div>
  </div>

  <div class="modal" id="modal">
    <h3>Add Tip</h3>
    <input id="tipText" placeholder="What's happening?" />
    <select id="tipSchool">
      <option value="uc">UC</option>
      <option value="lang">Lang</option>
      <option value="parsons">Parsons</option>
      <option value="copa">CoPA</option>
      <option value="nssr">NSSR</option>
    </select>
    <button onclick="addTip()">Post</button>
  </div>

  <div class="nav">
    <div onclick="showMap()">Map</div>
    <div onclick="openModal()">＋</div>
    <div onclick="showFeed()">Feed</div>
  </div>
</div>

<script>
let tips = [
  { tip:"Quiet study – Lang", school:"lang", time:"2:10 PM" },
  { tip:"Free pizza – UC", school:"uc", time:"3:15 PM" }
];

let currentFilter = "all";

function getPosition(school){
  const positions = {
    copa: {top:120, left:45},
    lang: {top:120, left:270},
    uc: {top:360, left:165},
    nssr: {top:585, left:45},
    parsons: {top:585, left:255}
  };
  return positions[school];
}

function renderTips(){
  const container = document.getElementById("tips-container");
  const feed = document.getElementById("feed-list");

  container.innerHTML = "";
  feed.innerHTML = "";

  tips.forEach(t => {
    const school = t.school.toLowerCase();
    if(currentFilter !== "all" && school !== currentFilter) return;

    const pos = getPosition(school);

    if(pos){
      const div = document.createElement("div");
      div.className = "tip";
      div.innerText = t.tip;
      div.style.top = pos.top + "px";
      div.style.left = pos.left + "px";
      container.appendChild(div);
    }

    const p = document.createElement("p");
    p.innerText = `${t.tip} (${t.time})`;
    feed.appendChild(p);
  });
}

function addTip(){
  const text = document.getElementById("tipText").value.trim();
  const school = document.getElementById("tipSchool").value;

  if(!text) return;

  tips.push({
    tip: text,
    school: school,
    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
  });

  document.getElementById("tipText").value = "";
  closeModal();
  renderTips();
}

function filterTips(school){
  currentFilter = school;
  renderTips();
}

function openModal(){
  document.getElementById("modal").classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

function showFeed(){
  document.getElementById("feed").style.display = "block";
  document.getElementById("map").style.display = "none";
  document.getElementById("filters").style.display = "none";
}

function showMap(){
  document.getElementById("feed").style.display = "none";
  document.getElementById("map").style.display = "block";
  document.getElementById("filters").style.display = "flex";
}

renderTips();
</script>
</body>
</html>
