
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro-Local Knowledge</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Helvetica, Arial, sans-serif;
  background: #e8e0c8;
}

.app {
  max-width: 420px;
  margin: auto;
  min-height: 100vh;
  background: #f5f0dc;
  position: relative;
}

/* TITLE */
.title {
  text-align: center;
  color: red;
  font-weight: bold;
  padding: 18px 10px 10px;
  font-size: 20px;
}

/* MAP */
.map {
  position: relative;
  height: 360px;
  background: url('https://i.imgur.com/8QZ7Z9R.png') center/cover;
}

/* BUILDING LABELS */
.label {
  position: absolute;
  padding: 8px 14px;
  border-radius: 20px;
  color: white;
  font-size: 12px;
  cursor: pointer;
  transition: transform 0.2s;
}

.label:active {
  transform: scale(0.95);
}

.lang { background:#6cc4d4; top:60px; left:40px; }
.parsons { background:#e59b64; top:140px; left:20px; }
.uc { background:red; top:160px; left:140px; }
.nssr { background:#3fb34f; top:60px; right:30px; }
.copa { background:#9b4de3; bottom:80px; right:20px; }

/* UC DOT */
.dot {
  position:absolute;
  width:12px;
  height:12px;
  background:red;
  border-radius:50%;
  top:200px;
  left:180px;
}

/* TIPS */
.tip {
  position:absolute;
  background:#ffe08a;
  padding:5px 8px;
  border-radius:10px;
  font-size:11px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

/* FILTER BAR */
.filters {
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:12px;
}

.filter {
  padding:8px 12px;
  border-radius:20px;
  color:white;
  font-size:11px;
  cursor:pointer;
  white-space:nowrap;
  opacity:0.8;
}

.filter.active {
  opacity:1;
  outline:2px solid #00000020;
}

.f-all { background:#999; }
.f-lang { background:#6cc4d4; }
.f-parsons { background:#e59b64; }
.f-uc { background:red; }
.f-copa { background:#9b4de3; }
.f-nssr { background:#3fb34f; }

/* BUILDING VIEW */
.building {
  display:none;
  padding:20px;
  background:#fff;
  position:absolute;
  inset:0;
  z-index:10;
}

.floor-tip {
  background:#aee1f9;
  padding:8px;
  border-radius:8px;
  margin:10px 0;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  max-width:420px;
  background:#8cc7c3;
  display:flex;
  justify-content:space-around;
  padding:12px;
  font-size:14px;
}
</style>

</head>

<body>

<div class="app">

  <div class="title">THE NEW SCHOOL CAMPUS</div>

  <!-- MAP -->

  <div class="map" id="map">

```
<div class="label lang" onclick="filterTips('lang')">LANG</div>
<div class="label parsons" onclick="filterTips('parsons')">PARSONS</div>
<div class="label uc" onclick="openBuilding()">UC</div>
<div class="label nssr" onclick="filterTips('nssr')">NSSR</div>
<div class="label copa" onclick="filterTips('copa')">COPA</div>

<div class="dot"></div>

<!-- TIPS -->
<div class="tip" data-school="uc" style="top:220px; left:130px;">
  Free pizza – UC
</div>

<div class="tip" data-school="lang" style="top:100px; left:50px;">
  Quiet study – Lang
</div>

<div class="tip" data-school="parsons" style="top:180px; left:40px;">
  Studio open – Parsons
</div>
```

  </div>

  <!-- FILTERS -->

  <div class="filters">
    <div class="filter f-all active" onclick="filterTips('all', this)">All</div>
    <div class="filter f-lang" onclick="filterTips('lang', this)">Lang</div>
    <div class="filter f-parsons" onclick="filterTips('parsons', this)">Parsons</div>
    <div class="filter f-uc" onclick="filterTips('uc', this)">UC</div>
    <div class="filter f-copa" onclick="filterTips('copa', this)">CoPA</div>
    <div class="filter f-nssr" onclick="filterTips('nssr', this)">NSSR</div>
  </div>

  <!-- BUILDING VIEW -->

  <div class="building" id="building">
    <h3>University Center</h3>

```
<div class="floor-tip">Free pizza – 2nd floor</div>
<div class="floor-tip">Elevator broken</div>
<div class="floor-tip">Quiet lounge – 5th floor</div>

<button onclick="closeBuilding()">← Back to map</button>
```

  </div>

  <!-- NAV -->

  <div class="nav">
    <div>Map</div>
    <div>＋</div>
    <div>Profile</div>
  </div>

</div>

<script>
function openBuilding(){
  document.getElementById("building").style.display="block";
}

function closeBuilding(){
  document.getElementById("building").style.display="none";
}

function filterTips(school, el){
  let tips = document.querySelectorAll(".tip");
  tips.forEach(t=>{
    if(school==="all" || t.dataset.school===school){
      t.style.display="block";
    } else {
      t.style.display="none";
    }
  });

  document.querySelectorAll(".filter").forEach(f=>f.classList.remove("active"));
  if(el) el.classList.add("active");
}
</script>

</body>
</html>
