<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Position Property Painting</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #eee;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Main red canvas */
.painting {
    position: relative;
    width: 900px;
    height: 500px;
    background: #ff1f3d;
}

/* Bottom green strip */
.ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 70px;
    background: #66bb33;
}

/* Common window style */
.window {
    position: absolute;
}

/* Divider lines */
.line-vertical {
    position: absolute;
    width: 6px;
    height: 100%;
    background: currentColor;
}

.line-horizontal {
    position: absolute;
    height: 6px;
    width: 100%;
    background: currentColor;
}

/* WINDOWS */

/* Left tall neon green */
.w1 {
    width: 120px;
    height: 260px;
    background: #c6ff00;
    top: 120px;
    left: 80px;
    border: 8px solid #e60039;
    color: #e60039;
}

/* Center divider */
.w1 .line-vertical {
    left: 50%;
    transform: translateX(-50%);
}

/* Small orange top */
.w2 {
    width: 150px;
    height: 90px;
    background: orange;
    top: 90px;
    left: 260px;
    border: 8px solid #6c63ff;
    color: #6c63ff;
}

/* Two horizontal lines */
.w2 .h1 { top: 33%; }
.w2 .h2 { top: 66%; }

/* Purple bottom left */
.w3 {
    width: 120px;
    height: 220px;
    background: #b388ff;
    top: 200px;
    left: 280px;
    border: 8px solid #ff4da6;
    color: #ff4da6;
}

/* Two vertical lines */
.w3 .v1 { left: 33%; }
.w3 .v2 { left: 66%; }

/* Tall blue center */
.w4 {
    width: 120px;
    height: 320px;
    background: #6fa8dc;
    top: 80px;
    left: 450px;
    border: 8px solid #99d9ea;
    color: #99d9ea;
}

/* Center divider */
.w4 .line-vertical {
    left: 50%;
    transform: translateX(-50%);
}

/* Pink right */
.w5 {
    width: 140px;
    height: 260px;
    background: #f8a1c4;
    top: 110px;
    left: 620px;
    border: 8px solid #3f51b5;
    color: #3f51b5;
}

/* Two vertical lines */
.w5 .v1 { left: 33%; }
.w5 .v2 { left: 66%; }

/* Small orange bottom right */
.w6 {
    width: 140px;
    height: 90px;
    background: #ff7043;
    top: 310px;
    left: 640px;
    border: 8px solid #ff2e63;
    color: #ff2e63;
}

/* Two horizontal lines */
.w6 .h1 { top: 33%; }
.w6 .h2 { top: 66%; }

</style>
</head>

<body>

<div class="painting">

    <div class="window w1">
        <div class="line-vertical"></div>
    </div>

    <div class="window w2">
        <div class="line-horizontal h1"></div>
        <div class="line-horizontal h2"></div>
    </div>

    <div class="window w3">
        <div class="line-vertical v1"></div>
        <div class="line-vertical v2"></div>
    </div>

    <div class="window w4">
        <div class="line-vertical"></div>
    </div>

    <div class="window w5">
        <div class="line-vertical v1"></div>
        <div class="line-vertical v2"></div>
    </div>

    <div class="window w6">
        <div class="line-horizontal h1"></div>
        <div class="line-horizontal h2"></div>
    </div>

    <div class="ground"></div>

</div>

</body>
</html>
