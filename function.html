<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speaking City</title>

  <style>
    body {
      font-family: Helvetica, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #fafafa;
    }

    #cityBox {
      width: 320px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      background-color: #f2f2f2;
      transition: all 0.4s ease;
      margin-bottom: 20px;
      text-align: center;
      padding: 20px;
      font-size: 18px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background-color: black;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    /* Mood styles */
    .calm {
      background-color: #d0f0ff;
      color: #003344;
    }

    .urgent {
      background-color: #ffdddd;
      color: #660000;
      letter-spacing: 1px;
    }

    .mysterious {
      background-color: #1e1e2f;
      color: #e0e0ff;
      font-style: italic;
    }
  </style>
</head>

<body>

  <div id="cityBox">
    <p id="message">Tap to hear the city...</p>
  </div>

  <button onclick="speakCity()">Where do I go?</button>

  <script>
    function speakCity() {
      const message = document.getElementById("message");
      const box = document.getElementById("cityBox");

      // Reset styles
      box.className = "";

      const directions = [
        {
          text: "Turn left where the street hums.",
          mood: "calm"
        },
        {
          text: "Hurry. The train is breathing below you.",
          mood: "urgent"
        },
        {
          text: "Not everything is mapped. Walk anyway.",
          mood: "mysterious"
        }
      ];

      const choice = directions[Math.floor(Math.random() * directions.length)];

      // Change content
      message.textContent = choice.text;

      // Change styling
      box.classList.add(choice.mood);
    }
  </script>

</body>
</html>
