<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CityFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #2F4A8A;
  color: white;
  text-align: center;
}

/* HEADER */
.header {
  padding: 20px;
  border-bottom: 2px solid #FFD400;
  display: flex;
  justify-content: space-between;
}

.title {
  font-size: 26px;
  font-weight: 800;
  color: #FFD400;
}

/* PATH BAR */
.path-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 15px 0;
  font-size: 22px;
}

.path-step {
  opacity: 0.4;
}

.active {
  opacity: 1;
  color: #FFD400;
}

/* MINI MAP */
.mini-map {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 20px;
}

.node {
  width: 14px;
  height: 14px;
  background: white;
  border-radius: 50%;
  opacity: 0.3;
}

.node.active-node {
  background: #FFD400;
  opacity: 1;
}

/* SYMBOL INPUT */
.symbols {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 20px;
}

.symbol {
  background: #6F86B6;
  padding: 12px 16px;
  border-radius: 10px;
  cursor: pointer;
}

/* BUTTON */
.cta {
  background: #FFD400;
  color: black;
  padding: 14px;
  border-radius: 30px;
  font-weight: bold;
  margin: 20px;
  cursor: pointer;
}

.hidden { display:none; }

.step {
  font-size: 60px;
  margin: 30px 0;
  color: #FFD400;
}

.choice {
  display: flex;
  justify-content: center;
  gap: 20px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <div class="header">
    <div class="title">CITYFLOW</div>
  </div>

  <div class="path-bar" id="preview"></div>

  <div class="symbols">
    <div class="symbol" onclick="addSymbol('→')">→</div>
    <div class="symbol" onclick="addSymbol('Y')">Y</div>
    <div class="symbol" onclick="addSymbol('↘')">↘</div>
    <div class="symbol" onclick="addSymbol('↺')">↺</div>
  </div>

  <div class="cta" onclick="startNavigation()">START</div>
</div>

<!-- ROUTE -->
<div id="route" class="hidden">

  <div class="header">
    <div class="title">LIVE ROUTE</div>
  </div>

  <!-- PATH BAR -->
  <div class="path-bar" id="pathBar"></div>

  <!-- MINI MAP -->
  <div class="mini-map" id="miniMap"></div>

  <div id="step" class="step">→</div>

  <div id="choice" class="choice hidden">
    <div class="symbol" onclick="chooseDirection('←')">←</div>
    <div class="symbol" onclick="chooseDirection('→')">→</div>
  </div>

  <div class="cta" onclick="goHome()">BACK</div>
</div>

<script>

let route = ["→","→","Y","↘"];
let index = 0;
let interval;

// ADD SYMBOL
function addSymbol(sym){
  route.push(sym);
  renderPreview();
}

// PREVIEW
function renderPreview(){
  let preview = document.getElementById("preview");
  preview.innerHTML = "";
  route.forEach(s=>{
    let el = document.createElement("div");
    el.innerText = s;
    preview.appendChild(el);
  });
}

// START
function startNavigation(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("route").classList.remove("hidden");
  index = 0;
  renderPathBar();
  renderMiniMap();
  playRoute();
}

// PATH BAR
function renderPathBar(){
  let bar = document.getElementById("pathBar");
  bar.innerHTML = "";
  route.forEach((s,i)=>{
    let el = document.createElement("div");
    el.innerText = s;
    el.className = "path-step" + (i===index ? " active":"");
    bar.appendChild(el);
  });
}

// MINI MAP
function renderMiniMap(){
  let map = document.getElementById("miniMap");
  map.innerHTML = "";
  route.forEach((_,i)=>{
    let el = document.createElement("div");
    el.className = "node" + (i===index ? " active-node":"");
    map.appendChild(el);
  });
}

// PLAY
function playRoute(){
  showStep();

  interval = setInterval(()=>{
    index++;

    if(index >= route.length){
      clearInterval(interval);
      return;
    }

    if(route[index] === "Y"){
      clearInterval(interval);
      showChoice();
    } else {
      showStep();
    }

  },1500);
}

// SHOW STEP
function showStep(){
  document.getElementById("step").innerText = route[index];
  renderPathBar();
  renderMiniMap();
}

// CHOICE
function showChoice(){
  document.getElementById("choice").classList.remove("hidden");
}

// USER CHOICE
function chooseDirection(dir){
  document.getElementById("choice").classList.add("hidden");
  route.splice(index+1,0,dir);
  renderPathBar();
  renderMiniMap();
  playRoute();
}

// BACK
function goHome(){
  clearInterval(interval);
  document.getElementById("route").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

renderPreview();

</script>

</body>
</html>
