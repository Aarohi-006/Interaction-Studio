<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CityFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #2F4A8A;
  color: white;
}

/* HEADER */
.header {
  padding: 20px;
  border-bottom: 2px solid #FFD400;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title {
  font-size: 28px;
  font-weight: 800;
  color: #FFD400;
}

.subtitle {
  font-size: 12px;
  opacity: 0.8;
}

/* HERO */
.hero {
  padding: 20px;
  text-align: center;
}

.preview-box {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 20px;
}

.route-preview {
  font-size: 36px;
  letter-spacing: 12px;
  color: #FFD400;
}

/* BUTTON */
.cta {
  background: #FFD400;
  color: black;
  padding: 16px;
  border-radius: 30px;
  font-weight: 700;
  text-align: center;
  cursor: pointer;
  margin: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  padding: 20px;
}

.card {
  background: #6F86B6;
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
}

.card span {
  display: block;
  margin-top: 10px;
  font-size: 12px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  border-top: 2px solid #FFD400;
  padding: 12px 0;
}

/* ROUTE SCREEN */
.hidden {
  display: none;
}

.route-screen {
  text-align: center;
  padding: 40px 20px;
}

.step {
  font-size: 60px;
  color: #FFD400;
  margin: 40px 0;
}

.step-label {
  font-size: 14px;
  opacity: 0.8;
}

/* BUTTON BACK */
.back {
  margin: 20px;
  padding: 12px;
  border: 1px solid #FFD400;
  border-radius: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">

  <div class="header">
    <div>
      <div class="title">CITY FLOW</div>
      <div class="subtitle">NAVIGATION MADE SIMPLE</div>
    </div>
    <div>🔍 ⭐</div>
  </div>

  <div class="hero">
    <div class="preview-box">
      <div class="route-preview">→ → Y ↘ ↺</div>
    </div>

    <div class="cta" onclick="startNavigation()">START NAVIGATION</div>
  </div>

  <div class="grid">
    <div class="card" onclick="quickRoute()">⏱<span>Quick Routes</span></div>
    <div class="card">⚙<span>Personalize</span></div>
    <div class="card">★<span>Saved Places</span></div>
    <div class="card">≡<span>Settings</span></div>
  </div>

</div>

<!-- ROUTE -->
<div id="route" class="hidden">

  <div class="header">
    <div class="title">LIVE ROUTE</div>
    <div>⏱</div>
  </div>

  <div class="route-screen">
    <div id="step" class="step">→</div>
    <div class="step-label">Follow this direction</div>
  </div>

  <div class="back" onclick="goHome()">Back</div>

</div>

<!-- NAV -->
<div class="nav">
  <div>🏠</div>
  <div>🔍</div>
  <div>❤</div>
</div>

<script>

const route = ["→", "→", "Y", "↘", "↺"];
let index = 0;
let interval;

function startNavigation() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("route").classList.remove("hidden");

  index = 0;
  showStep();

  interval = setInterval(() => {
    index++;
    if (index >= route.length) {
      clearInterval(interval);
      return;
    }
    showStep();
  }, 1500);
}

function showStep() {
  document.getElementById("step").innerText = route[index];
}

function goHome() {
  document.getElementById("route").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
  clearInterval(interval);
}

function quickRoute() {
  alert("Quick Route: → → Y");
}

</script>

</body>
</html>
