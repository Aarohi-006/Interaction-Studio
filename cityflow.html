<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CityFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #2F4A8A;
  color: white;
  text-align: center;
}

/* HEADER */
.header {
  padding: 20px;
  border-bottom: 2px solid #FFD400;
  display: flex;
  justify-content: space-between;
}

.title {
  font-size: 26px;
  font-weight: 800;
  color: #FFD400;
}

.subtitle {
  font-size: 12px;
  opacity: 0.7;
}

/* ROUTE DISPLAY */
.route-preview {
  font-size: 34px;
  letter-spacing: 10px;
  margin: 20px;
  color: #FFD400;
}

/* BUTTON */
.cta {
  background: #FFD400;
  color: black;
  padding: 14px;
  border-radius: 30px;
  font-weight: 700;
  margin: 20px;
  cursor: pointer;
}

/* SYMBOL BUTTONS */
.symbols {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 15px;
  padding: 20px;
}

.symbol {
  background: #6F86B6;
  padding: 15px 20px;
  border-radius: 12px;
  font-size: 24px;
  cursor: pointer;
}

.symbol:hover {
  background: #8FA6D4;
}

/* ROUTE SCREEN */
.hidden {
  display: none;
}

.step {
  font-size: 60px;
  margin: 40px 0;
  color: #FFD400;
}

.choice {
  display: flex;
  justify-content: center;
  gap: 20px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  border-top: 2px solid #FFD400;
  padding: 10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">

  <div class="header">
    <div>
      <div class="title">CITY FLOW</div>
      <div class="subtitle">NAVIGATION IS FOLLOWED</div>
    </div>
    <div>🔍 ⭐</div>
  </div>

  <div class="route-preview" id="preview">→ → Y ↘</div>

  <!-- SYMBOL INPUT -->
  <div class="symbols">
    <div class="symbol" onclick="addSymbol('→')">→</div>
    <div class="symbol" onclick="addSymbol('Y')">Y</div>
    <div class="symbol" onclick="addSymbol('↘')">↘</div>
    <div class="symbol" onclick="addSymbol('↺')">↺</div>
    <div class="symbol" onclick="addSymbol('←')">←</div>
  </div>

  <div class="cta" onclick="startNavigation()">START NAVIGATION</div>

</div>

<!-- ROUTE SCREEN -->
<div id="route" class="hidden">

  <div class="header">
    <div class="title">LIVE ROUTE</div>
    <div>⏱</div>
  </div>

  <div id="step" class="step">→</div>

  <div id="choice" class="choice hidden">
    <div class="symbol" onclick="chooseDirection('←')">←</div>
    <div class="symbol" onclick="chooseDirection('→')">→</div>
  </div>

  <div class="cta" onclick="goHome()">BACK</div>

</div>

<!-- NAV -->
<div class="nav">
  <div>🏠</div>
  <div>🔍</div>
  <div>❤</div>
</div>

<script>

let route = ["→","→","Y","↘"];
let index = 0;
let interval;

// ADD SYMBOL
function addSymbol(sym) {
  route.push(sym);
  document.getElementById("preview").innerText = route.join(" ");
}

// START NAV
function startNavigation() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("route").classList.remove("hidden");

  index = 0;
  playRoute();
}

// PLAY ROUTE
function playRoute() {
  showStep();

  interval = setInterval(() => {
    index++;

    if (index >= route.length) {
      clearInterval(interval);
      return;
    }

    if (route[index] === "Y") {
      clearInterval(interval);
      showChoice();
    } else {
      showStep();
    }

  }, 1500);
}

// SHOW STEP
function showStep() {
  document.getElementById("step").innerText = route[index];
}

// SHOW CHOICE
function showChoice() {
  document.getElementById("choice").classList.remove("hidden");
}

// USER CHOICE
function chooseDirection(dir) {
  document.getElementById("choice").classList.add("hidden");
  route.splice(index + 1, 0, dir);
  playRoute();
}

// BACK
function goHome() {
  clearInterval(interval);
  document.getElementById("route").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

</script>

</body>
</html>
