<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visual Phrase Generator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    #output {
      margin-top: 30px;
      font-size: 1.5rem;
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Visual Phrase Generator</h1>
    <button onclick="generate()">Generate</button>
    <p id="output">Click to create a scene</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
