<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visual Phrase Generator</title>

  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-size: cover;
      background-position: center;
      transition: background-image 0.6s ease-in-out;
    }

    /* dark overlay for readability */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      background: white;
      color: black;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #output {
      margin-top: 25px;
      font-size: 1.4rem;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #output.show {
      opacity: 1;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Visual Phrase Generator</h1>
    <button id="btn">Generate</button>
    <p id="output">Click to generate a scene</p>
  </div>

  <script>
    const phrases = [
      "rising incense smoke",
      "glowing ritual lights",
      "mist-covered mountains",
      "still water reflections",
      "neon chaos"
    ];

   const images = [
  "img1.jpg",
  "img2.jpg",
  "img3.jpg"
];

    function randomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    document.getElementById("btn").addEventListener("click", function () {
      const output = document.getElementById("output");

      // generate text
      const line = randomItem(phrases) + " meets " + randomItem(phrases);

      // animate text
      output.classList.remove("show");
      void output.offsetWidth;
      output.innerText = line;
      output.classList.add("show");

      // change background
      const randomImage = randomItem(images);
      document.body.style.backgroundImage = `url('${randomImage}')`;
    });
  </script>

</body>
</html>
